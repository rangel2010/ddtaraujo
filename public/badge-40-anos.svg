<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="goldFace" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff4b8"/>
      <stop offset="35%" stop-color="#f5cf4a"/>
      <stop offset="70%" stop-color="#c89525"/>
      <stop offset="100%" stop-color="#7a5810"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a87916"/>
      <stop offset="50%" stop-color="#5a3a08"/>
      <stop offset="100%" stop-color="#8c620f"/>
    </linearGradient>
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <!-- Arco para texto curvo topo (mais interno, com folga) -->
    <path id="topArc" d="M 42 100 A 58 58 0 0 1 158 100"/>
    <!-- Arco base -->
    <path id="bottomArc" d="M 42 108 A 58 58 0 0 0 158 108"/>
  </defs>

  <!-- Sombra projetada -->
  <circle cx="100" cy="104" r="93" fill="#000" opacity="0.3" filter="url(#emboss)"/>

  <!-- Aro externo escuro -->
  <circle cx="100" cy="100" r="95" fill="url(#rim)"/>
  <!-- Face dourada -->
  <circle cx="100" cy="100" r="85" fill="url(#goldFace)"/>
  <!-- Anel interno duplo -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#7a5810" stroke-width="1.8" opacity="0.6"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#fff4b8" stroke-width="0.8" opacity="0.7"/>

  <!-- Estrelas decorativas nas laterais -->
  <g fill="#5a3a08">
    <path d="M 22 100 l 2.5 -1.2 l -1.2 -2.5 l 2.5 1.2 l 2.5 -1.2 l -1.2 2.5 l 2.5 1.2 l -2.5 1.2 l 1.2 2.5 l -2.5 -1.2 l -2.5 1.2 l 1.2 -2.5 z"/>
    <path d="M 173 100 l 2.5 -1.2 l -1.2 -2.5 l 2.5 1.2 l 2.5 -1.2 l -1.2 2.5 l 2.5 1.2 l -2.5 1.2 l 1.2 2.5 l -2.5 -1.2 l -2.5 1.2 l 1.2 -2.5 z"/>
  </g>

  <!-- Texto curvo topo -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700" fill="#5a3a08" letter-spacing="2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">◆ ARAÚJO ◆</textPath>
  </text>
  <!-- Texto curvo base -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700" fill="#5a3a08" letter-spacing="5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">1985 — 2026</textPath>
  </text>

  <!-- Sombra do "40" para profundidade -->
  <text x="101" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="900" fill="#3a2706" text-anchor="middle" letter-spacing="-2" opacity="0.7">40</text>
  <!-- Número 40 principal -->
  <text x="100" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="900" fill="#5a3a08" text-anchor="middle" letter-spacing="-2">40</text>
  <!-- Highlight branco no 40 -->
  <text x="99" y="117" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="900" fill="#fff4b8" text-anchor="middle" letter-spacing="-2" opacity="0.25">40</text>

  <!-- ANOS abaixo -->
  <text x="100" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#5a3a08" text-anchor="middle" letter-spacing="5">ANOS</text>

  <!-- Brilho de luz no topo -->
  <ellipse cx="80" cy="55" rx="42" ry="20" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="75" cy="50" rx="22" ry="9" fill="#ffffff" opacity="0.55"/>
</svg>
